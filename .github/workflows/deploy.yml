name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/todolistapp:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/todolistapp:${{ github.sha }}
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/todolistapp:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/todolistapp:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/todolistapp:latest

      - name: Show success message
        run: echo "✅ Docker image built and pushed to ACR successfully!"
